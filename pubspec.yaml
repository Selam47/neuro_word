name: neuro_word
description: "Neuro Word - A premium English-Turkish Language Learning App with a futuristic cyberpunk aesthetic."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.9.0
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  go_router: ^14.8.1
  url_launcher: ^6.3.2
  glass_kit: ^3.0.0
  animations: ^2.0.8
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/icon/
    - assets/animations/
    - assets/data/
    - .env


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
